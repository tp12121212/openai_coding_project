<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Workflow overview</title>
  <desc id="desc">Flow from inputs to templates, orchestration, validation, delivery mode, and final artifacts.</desc>
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .box { fill: #111827; stroke: #334155; stroke-width: 2; rx: 14; }
      .title { fill: #e2e8f0; font: 700 24px Inter, system-ui, sans-serif; }
      .label { fill: #cbd5e1; font: 600 18px Inter, system-ui, sans-serif; }
      .small { fill: #93c5fd; font: 500 15px Inter, system-ui, sans-serif; }
      .arrow { stroke: #38bdf8; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" />
  <text class="title" x="40" y="50">Codex Project Orchestration Workflow</text>

  <rect class="box" x="40" y="100" width="180" height="120" />
  <text class="label" x="60" y="145">Inputs</text>
  <text class="small" x="60" y="172">Project name</text>
  <text class="small" x="60" y="194">Description</text>

  <rect class="box" x="260" y="100" width="200" height="120" />
  <text class="label" x="280" y="145">Template + Profile</text>
  <text class="small" x="280" y="172">Built-in template</text>
  <text class="small" x="280" y="194">Codex profile</text>

  <rect class="box" x="500" y="100" width="180" height="120" />
  <text class="label" x="520" y="145">Orchestration</text>
  <text class="small" x="520" y="172">Deterministic</text>
  <text class="small" x="520" y="194">file generation</text>

  <rect class="box" x="720" y="100" width="180" height="120" />
  <text class="label" x="740" y="145">Validation</text>
  <text class="small" x="740" y="172">Path hygiene</text>
  <text class="small" x="740" y="194">Collision checks</text>

  <rect class="box" x="940" y="100" width="220" height="120" />
  <text class="label" x="960" y="145">Delivery Mode</text>
  <text class="small" x="960" y="172">ZIP / New Repo / PR</text>
  <text class="small" x="960" y="194">Mode-specific output</text>

  <path class="arrow" d="M220 160 L260 160" />
  <path class="arrow" d="M460 160 L500 160" />
  <path class="arrow" d="M680 160 L720 160" />
  <path class="arrow" d="M900 160 L940 160" />

  <rect class="box" x="320" y="270" width="560" height="100" />
  <text class="label" x="340" y="315">Resulting Artifacts</text>
  <text class="small" x="340" y="342">Downloadable ZIP, new GitHub repository, or existing-repository pull request metadata.</text>
</svg>
