name: Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '20'
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-codex-scaffold' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY || 'codexscaffoldacr' }}
  AZURE_CONTAINERAPPS_ENV: ${{ vars.AZURE_CONTAINERAPPS_ENV || 'cae-codex-scaffold' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'codex-scaffold-app' }}
  AZURE_IMAGE_REPOSITORY: codex-project-scaffold-manager
  AZURE_APP_SERVICE_PLAN: ${{ vars.AZURE_APP_SERVICE_PLAN || 'asp-codex-scaffold-b1' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, tests
        run: npm run lint && npm run typecheck && npm run test

      - name: Build
        run: npm run build

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps (preferred)
        id: deploy_containerapp
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait

          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

          if ! az acr show --name "$AZURE_CONTAINER_REGISTRY" --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
            az acr create \
              --name "$AZURE_CONTAINER_REGISTRY" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION" \
              --sku Basic \
              --admin-enabled true \
              --output none
          fi

          az acr update --name "$AZURE_CONTAINER_REGISTRY" --admin-enabled true --output none

          ACR_LOGIN_SERVER="$(az acr show --name "$AZURE_CONTAINER_REGISTRY" --resource-group "$AZURE_RESOURCE_GROUP" --query loginServer -o tsv)"
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_NAME="$AZURE_IMAGE_REPOSITORY:$IMAGE_TAG"
          FULL_IMAGE="$ACR_LOGIN_SERVER/$IMAGE_NAME"

          az acr build \
            --registry "$AZURE_CONTAINER_REGISTRY" \
            --image "$IMAGE_NAME" \
            --file Dockerfile \
            .

          if ! az containerapp env show --name "$AZURE_CONTAINERAPPS_ENV" --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
            az containerapp env create \
              --name "$AZURE_CONTAINERAPPS_ENV" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION" \
              --output none
          fi

          ACR_USERNAME="$(az acr credential show --name "$AZURE_CONTAINER_REGISTRY" --query username -o tsv)"
          ACR_PASSWORD="$(az acr credential show --name "$AZURE_CONTAINER_REGISTRY" --query passwords[0].value -o tsv)"

          if az containerapp show --name "$AZURE_CONTAINER_APP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
            az containerapp update \
              --name "$AZURE_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --image "$FULL_IMAGE" \
              --set-env-vars NODE_ENV=production PORT=3000 \
              --output none
          else
            az containerapp create \
              --name "$AZURE_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --environment "$AZURE_CONTAINERAPPS_ENV" \
              --image "$FULL_IMAGE" \
              --target-port 3000 \
              --ingress external \
              --registry-server "$ACR_LOGIN_SERVER" \
              --registry-username "$ACR_USERNAME" \
              --registry-password "$ACR_PASSWORD" \
              --cpu 0.5 \
              --memory 1Gi \
              --env-vars NODE_ENV=production PORT=3000 \
              --output none
          fi

          CONTAINER_APP_URL="https://$(az containerapp show --name "$AZURE_CONTAINER_APP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)"
          echo "container_app_url=$CONTAINER_APP_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy fallback to Azure App Service (B1 Linux)
        id: deploy_app_service
        if: steps.deploy_containerapp.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail

          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --output none

          if ! az appservice plan show --name "$AZURE_APP_SERVICE_PLAN" --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
            az appservice plan create \
              --name "$AZURE_APP_SERVICE_PLAN" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION" \
              --is-linux \
              --sku B1 \
              --output none
          fi

          if ! az webapp show --name "${{ secrets.AZURE_WEBAPP_NAME }}" --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1; then
            az webapp create \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --plan "$AZURE_APP_SERVICE_PLAN" \
              --runtime "NODE:20-lts" \
              --output none
          fi

          az webapp config set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --startup-file "node .next/standalone/server.js" \
            --output none

          az webapp config appsettings set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings NODE_ENV=production PORT=8080 \
            --output none

          zip -r app.zip . -x '.git/*' 'node_modules/*'

          az webapp deploy \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --src-path app.zip \
            --type zip \
            --clean true \
            --output none

          APP_SERVICE_URL="https://$(az webapp show --name "${{ secrets.AZURE_WEBAPP_NAME }}" --resource-group "$AZURE_RESOURCE_GROUP" --query defaultHostName -o tsv)"
          echo "app_service_url=$APP_SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        shell: bash
        run: |
          if [ "${{ steps.deploy_containerapp.outcome }}" = "success" ]; then
            echo "Deployed to Azure Container Apps: ${{ steps.deploy_containerapp.outputs.container_app_url }}"
          else
            echo "Deployed to Azure App Service fallback: ${{ steps.deploy_app_service.outputs.app_service_url }}"
          fi
